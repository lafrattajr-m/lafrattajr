<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Você está Offline</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #F3E9DC;
      color: #2C3E50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .icon {
      font-size: 4rem;
      color: #FAD266;
      margin-bottom: 20px;
    }

    a.retry {
      background-color: #2C3E50;
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
    }

    a.retry:hover {
      background-color: #3C5A4B;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Você está offline</h1>
  <p>Esta página não está disponível no momento.<br>Verifique sua conexão com a internet e tente novamente.</p>
  <a href="/" class="retry">Tentar novamente</a>
</body>
</html>
